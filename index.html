<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Students</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between mb-8 bg-white p-4 rounded-lg shadow-sm">
        <div class="flex items-center">
            <img src="logo.png" alt="Academy Logo" class="h-16 object-contain" onerror="this.style.display='none'">
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mt-4 md:mt-0">Student Portal</h1>
        
        <a href="admin.html" class="mt-4 md:mt-0 bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-4 rounded text-sm transition duration-200">
            Admin Login
        </a>
    </div>

    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Search Students</h2>
            
            <form id="searchForm" class="space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Name (Wildcard)</label>
                        <input type="text" id="name" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Registration No</label>
                        <input type="text" id="registration_no" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Colour Belt</label>
                        <select id="belt" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                            <option value="">Any</option>
                            <option value="Yellow">Yellow</option>
                            <option value="Orange">Orange</option>
                            <option value="Green">Green</option>
                            <option value="Blue Stripe">Blue Stripe</option>
                            <option value="Blue">Blue</option>
                            <option value="Purple Strip">Purple Strip</option>
                            <option value="Brown III">Brown III</option>
                            <option value="Brown II">Brown II</option>
                            <option value="Brown I">Brown I</option>
                            <option value="Black">Black</option>
                            <option value="Shodan (1st Dan)">Shodan (1st Dan)</option>
                            <option value="Nidan (2nd Dan)">Nidan (2nd Dan)</option>
                            <option value="Sandan (3rd Dan)">Sandan (3rd Dan)</option>
                            <option value="Yondan (4th Dan)">Yondan (4th Dan)</option>
                            <option value="Godan (5th Dan)">Godan (5th Dan)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Kyu</label>
                        <input type="text" id="kyu" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">State</label>
                        <select id="state" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                            <option value="">Any</option>
                            <option value="Andhra Pradesh">Andhra Pradesh</option>
                            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                            <option value="Assam">Assam</option>
                            <option value="Bihar">Bihar</option>
                            <option value="Chhattisgarh">Chhattisgarh</option>
                            <option value="Goa">Goa</option>
                            <option value="Gujarat">Gujarat</option>
                            <option value="Haryana">Haryana</option>
                            <option value="Himachal Pradesh">Himachal Pradesh</option>
                            <option value="Jharkhand">Jharkhand</option>
                            <option value="Karnataka">Karnataka</option>
                            <option value="Kerala">Kerala</option>
                            <option value="Madhya Pradesh">Madhya Pradesh</option>
                            <option value="Maharashtra">Maharashtra</option>
                            <option value="Manipur">Manipur</option>
                            <option value="Meghalaya">Meghalaya</option>
                            <option value="Mizoram">Mizoram</option>
                            <option value="Nagaland">Nagaland</option>
                            <option value="Odisha">Odisha</option>
                            <option value="Punjab">Punjab</option>
                            <option value="Rajasthan">Rajasthan</option>
                            <option value="Sikkim">Sikkim</option>
                            <option value="Tamil Nadu">Tamil Nadu</option>
                            <option value="Telangana">Telangana</option>
                            <option value="Tripura">Tripura</option>
                            <option value="Uttar Pradesh">Uttar Pradesh</option>
                            <option value="Uttarakhand">Uttarakhand</option>
                            <option value="West Bengal">West Bengal</option>
                            <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                            <option value="Chandigarh">Chandigarh</option>
                            <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra & Nagar Haveli and Daman & Diu</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                            <option value="Ladakh">Ladakh</option>
                            <option value="Lakshadweep">Lakshadweep</option>
                            <option value="Puducherry">Puducherry</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Year of Reg (YYYY)</label>
                        <input type="number" id="year" placeholder="e.g. 2024" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                
                <div class="flex justify-end pt-2">
                    <button id="searchBtn" type="submit" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        Search
                    </button>
                </div>
            </form>
        </div>

        <div id="resultsContainer" class="bg-white rounded-lg shadow-md overflow-hidden hidden">
            
            <div id="printableTable" class="overflow-x-auto p-4">
                <h2 id="pdfHeader" class="text-xl font-bold mb-4 hidden">Student Search Results</h2>
                <table class="min-w-full text-left border-collapse border border-gray-200">
                    <thead class="bg-gray-100 border-b">
                        <tr>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700 border">Name</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700 border">Reg No</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700 border">Date</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700 border">Kyu</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700 border">Belt</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700 border">State</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>

            <div id="downloadActions" class="p-4 bg-gray-50 border-t flex justify-end space-x-4 hidden">
                <button id="btnDownloadHtml" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                    Download HTML
                </button>
                <button id="btnDownloadPdf" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                    Download PDF
                </button>
            </div>

            <div id="noResults" class="p-6 text-center text-gray-500 hidden">
                No students found matching your criteria.
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://karate-api.karateamitshaw.workers.dev"; // REPLACE WITH YOUR WORKER URL (no /search at the end)

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const searchBtn = document.getElementById('searchBtn');
            searchBtn.disabled = true;
            searchBtn.innerText = "Searching...";
            
            const params = new URLSearchParams();
            const fields = ['name', 'registration_no', 'belt', 'kyu', 'state', 'year'];
            
            fields.forEach(id => {
                const val = document.getElementById(id).value.trim();
                if(val) params.append(id === 'belt' ? 'colour_belt' : id, val);
            });

            try {
                const response = await fetch(`${API_URL}/search?${params.toString()}`);
                const data = await response.json();
                
                const container = document.getElementById('resultsContainer');
                const tbody = document.getElementById('resultsBody');
                const noResults = document.getElementById('noResults');
                const downloadActions = document.getElementById('downloadActions');
                const printableTable = document.getElementById('printableTable');
                
                container.classList.remove('hidden');
                tbody.innerHTML = ""; 

                if (data.length === 0) {
                    noResults.classList.remove('hidden');
                    downloadActions.classList.add('hidden');
                    printableTable.classList.add('hidden');
                } else {
                    noResults.classList.add('hidden');
                    printableTable.classList.remove('hidden');
                    downloadActions.classList.remove('hidden'); // Show download buttons

                    data.forEach(student => {
                        tbody.innerHTML += `
                            <tr class="hover:bg-gray-50 transition duration-150">
                                <td class="px-6 py-4 text-sm text-gray-800 whitespace-nowrap border">${student.name}</td>
                                <td class="px-6 py-4 text-sm text-gray-600 whitespace-nowrap border">${student.registration_no}</td>
                                <td class="px-6 py-4 text-sm text-gray-600 whitespace-nowrap border">${student.date_of_registration}</td>
                                <td class="px-6 py-4 text-sm text-gray-600 whitespace-nowrap border">${student.kyu || '-'}</td>
                                <td class="px-6 py-4 text-sm text-gray-600 whitespace-nowrap border">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800 border border-gray-300">
                                        ${student.colour_belt || '-'}
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-sm text-gray-600 whitespace-nowrap border">${student.state}</td>
                            </tr>
                        `;
                    });
                }
            } catch (error) {
                alert("Error fetching search results. Ensure your Worker URL is correct.");
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerText = "Search";
            }
        });

        // --- DOWNLOAD AS HTML LOGIC ---
        document.getElementById('btnDownloadHtml').addEventListener('click', () => {
            const tableHtml = document.querySelector('#printableTable').innerHTML;
            const fullHtml = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Student Search Results</title>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; }
                        h2 { text-align: center; color: #333; }
                        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
                        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                        th { background-color: #f4f4f4; color: #333; }
                        tr:nth-child(even) { background-color: #f9f9f9; }
                    </style>
                </head>
                <body>
                    ${tableHtml.replace('hidden', '')} </body>
                </html>
            `;
            
            const blob = new Blob([fullHtml], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Student_Search_Results.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

       // --- DOWNLOAD AS PDF LOGIC ---
        document.getElementById('btnDownloadPdf').addEventListener('click', () => {
            const element = document.getElementById('printableTable');
            const header = document.getElementById('pdfHeader');
            
            // 1. Show the header title temporarily for the PDF
            header.classList.remove('hidden');
            
            // 2. FIX: Temporarily remove the horizontal scroll class. 
            // html2pdf cannot render elements that have overflow-x-auto!
            element.classList.remove('overflow-x-auto');

            const opt = {
                margin:       0.5,
                filename:     'Student_Search_Results.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                // 3. FIX: Force it to render from the top-left so scrolling down doesn't break it
                html2canvas:  { scale: 2, useCORS: true, scrollY: 0, scrollX: 0 }, 
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'landscape' }
            };

            // Generate PDF
            html2pdf().set(opt).from(element).save().then(() => {
                // Restore the layout after the PDF finishes downloading
                header.classList.add('hidden');
                element.classList.add('overflow-x-auto');
            });
        });
    </script>
</body>
</html>
