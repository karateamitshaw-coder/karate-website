<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Students</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Search Students</h2>
            
            <form id="searchForm" class="space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Name (Wildcard)</label>
                        <input type="text" id="name" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Registration No</label>
                        <input type="text" id="registration_no" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Colour Belt</label>
                        <input type="text" id="belt" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Kyu</label>
                        <input type="text" id="kyu" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">State</label>
                        <input type="text" id="state" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Year of Reg (YYYY)</label>
                        <input type="number" id="year" placeholder="2024" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                
                <div class="flex justify-end pt-2">
                    <button type="submit" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded transition duration-200">
                        Search
                    </button>
                </div>
            </form>
        </div>

        <div id="resultsContainer" class="bg-white rounded-lg shadow-md overflow-hidden hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">Name</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">Reg No</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">Date</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">Kyu</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">Belt</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">State</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody" class="divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>
            <div id="noResults" class="p-6 text-center text-gray-500 hidden">
                No students found matching your criteria.
            </div>
        </div>

    </div>

    <script>
        const API_URL = "https://karate-api.karateamitshaw.workers.dev/search"; // Replace with your Worker URL

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const params = new URLSearchParams();
            const fields = ['name', 'registration_no', 'belt', 'kyu', 'state', 'year'];
            
            fields.forEach(id => {
                const val = document.getElementById(id).value.trim();
                if(val) params.append(id === 'belt' ? 'colour_belt' : id, val);
            });

            try {
                const response = await fetch(`${API_URL}?${params.toString()}`);
                const data = await response.json();
                
                const container = document.getElementById('resultsContainer');
                const tbody = document.getElementById('resultsBody');
                const noResults = document.getElementById('noResults');
                
                container.classList.remove('hidden'); // Show the results box
                tbody.innerHTML = ""; 

                if (data.length === 0) {
                    noResults.classList.remove('hidden');
                } else {
                    noResults.classList.add('hidden');
                    data.forEach(student => {
                        // Creating row with Tailwind padding and styling
                        tbody.innerHTML += `
                            <tr class="hover:bg-gray-50 transition duration-150">
                                <td class="px-6 py-4 text-sm text-gray-800 whitespace-nowrap">${student.name}</td>
                                <td class="px-6 py-4 text-sm text-gray-600 whitespace-nowrap">${student.registration_no}</td>
                                <td class="px-6 py-4 text-sm text-gray-600 whitespace-nowrap">${student.date_of_registration}</td>
                                <td class="px-6 py-4 text-sm text-gray-600 whitespace-nowrap">${student.kyu}</td>
                                <td class="px-6 py-4 text-sm text-gray-600 whitespace-nowrap">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800 border border-gray-200">
                                        ${student.colour_belt}
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-sm text-gray-600 whitespace-nowrap">${student.state}</td>
                            </tr>
                        `;
                    });
                }
            } catch (error) {
                alert("Error fetching search results. Ensure your Worker URL is correct.");
            }
        });
    </script>
</body>
</html>
