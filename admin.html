<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div id="loginScreen" class="flex items-center justify-center min-h-[80vh]">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
            <div class="flex justify-center mb-6">
                <img src="logo.png" alt="Logo" class="h-16 object-contain" onerror="this.style.display='none'">
            </div>
            <h2 class="text-xl font-bold text-center mb-4">Admin Login</h2>
            <form id="loginForm" class="space-y-4">
                <input type="password" id="loginPassword" placeholder="Enter Password" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                <button type="submit" id="loginBtn" class="w-full bg-gray-800 text-white font-bold py-2 rounded-md hover:bg-gray-900">Login</button>
                <p id="loginError" class="text-red-500 text-sm text-center hidden">Incorrect Password</p>
            </form>
            <div class="text-center mt-4">
                <a href="index.html" class="text-blue-500 text-sm hover:underline">&larr; Back to Search</a>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="hidden max-w-4xl mx-auto mt-8">
        
        <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Admin Dashboard</h1>
            <div class="space-x-2">
                <button onclick="document.getElementById('passwordModal').classList.remove('hidden')" class="bg-yellow-500 hover:bg-yellow-600 text-white text-sm px-4 py-2 rounded">Change Password</button>
                <a href="index.html" class="bg-gray-500 hover:bg-gray-600 text-white text-sm px-4 py-2 rounded">Go to Search</a>
            </div>
        </div>

        <div class="bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-xl font-bold text-gray-800 mb-6 border-b pb-2">Add New Student</h2>
            <p class="text-sm text-green-600 mb-4 font-semibold">Session active. You can add multiple students.</p>
            
            <form id="addForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Name *</label>
                        <input type="text" id="name" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Registration No *</label>
                        <input type="text" id="registration_no" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Date of Registration *</label>
                        <input type="date" id="date" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">State *</label>
                        <select id="state" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">-- Select State --</option>
                            <option value="Andhra Pradesh">Andhra Pradesh</option>
                            <option value="West Bengal">West Bengal</option>
                            <option value="Delhi">Delhi</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Kyu</label>
                        <input type="text" id="kyu" placeholder="e.g. 10th" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Colour Belt</label>
                        <select id="belt" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">-- Select Belt --</option>
                            <option value="White">White</option><option value="Yellow">Yellow</option><option value="Orange">Orange</option>
                            <option value="Green">Green</option><option value="Blue">Blue</option><option value="Purple">Purple</option>
                            <option value="Brown">Brown</option><option value="Black">Black</option>
                        </select>
                    </div>
                </div>
                <p id="beltError" class="text-red-500 text-sm hidden">Please enter either Kyu or select a Colour Belt.</p>
                
                <button id="submitBtn" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md disabled:opacity-50 mt-4">
                    Save Student
                </button>
            </form>
        </div>
    </div>

    <div id="passwordModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg w-full max-w-sm">
            <h3 class="text-lg font-bold mb-4">Change Password</h3>
            <form id="changePwdForm" class="space-y-4">
                <input type="password" id="newPwd" placeholder="New Password" required class="w-full px-4 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
                <div class="flex justify-end space-x-2 mt-4">
                    <button type="button" onclick="document.getElementById('passwordModal').classList.add('hidden')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-yellow-500 text-white rounded hover:bg-yellow-600">Update</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://karate-api.karateamitshaw.workers.dev"; // Just the base URL without /add or /search e.g. https://karate-api.you.workers.dev
        let sessionPassword = "";

        // LOGIN LOGIC
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pwdInput = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');
            
            btn.disabled = true; btn.innerText = "Verifying..."; err.classList.add('hidden');

            try {
                const res = await fetch(`${API_URL}/verify-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwdInput })
                });

                if (res.ok) {
                    sessionPassword = pwdInput; // Save password in memory for session
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('adminDashboard').classList.remove('hidden');
                } else {
                    err.classList.remove('hidden');
                }
            } catch (error) {
                alert("Connection error.");
            } finally {
                btn.disabled = false; btn.innerText = "Login";
            }
        });

        // ADD STUDENT LOGIC
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const kyuInput = document.getElementById('kyu').value.trim();
            const beltInput = document.getElementById('belt').value;
            const errorText = document.getElementById('beltError');
            const submitBtn = document.getElementById('submitBtn');

            if (!kyuInput && !beltInput) {
                errorText.classList.remove('hidden'); return;
            } else { errorText.classList.add('hidden'); }

            submitBtn.disabled = true; submitBtn.innerText = "Saving Data...";

            const data = {
                password: sessionPassword, // Send token to authorize request
                name: document.getElementById('name').value.trim(),
                registration_no: document.getElementById('registration_no').value.trim(),
                date_of_registration: document.getElementById('date').value,
                kyu: kyuInput,
                colour_belt: beltInput,
                state: document.getElementById('state').value
            };

            try {
                const response = await fetch(`${API_URL}/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if(response.ok) {
                    alert("Saved successfully!");
                    document.getElementById('addForm').reset(); // Clear form for next entry
                } else {
                    alert("Authorization Error. Your session may have expired.");
                }
            } catch (error) {
                alert("Network Error.");
            } finally {
                submitBtn.disabled = false; submitBtn.innerText = "Save Student";
            }
        });

        // CHANGE PASSWORD LOGIC
        document.getElementById('changePwdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPwd = document.getElementById('newPwd').value;
            
            try {
                const res = await fetch(`${API_URL}/change-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword: sessionPassword, newPassword: newPwd })
                });

                if (res.ok) {
                    alert("Password updated successfully!");
                    sessionPassword = newPwd; // Update session with new password
                    document.getElementById('passwordModal').classList.add('hidden');
                    document.getElementById('changePwdForm').reset();
                } else {
                    alert("Failed to update password.");
                }
            } catch(error) {
                alert("Network error");
            }
        });
    </script>
</body>
</html>
