<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div id="loginScreen" class="flex items-center justify-center min-h-[80vh]">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
            <div class="flex justify-center mb-6">
                <img src="logo.png" alt="Logo" class="h-16 object-contain" onerror="this.style.display='none'">
            </div>
            <h2 class="text-xl font-bold text-center mb-4">Admin Login</h2>
            <form id="loginForm" class="space-y-4">
                <input type="password" id="loginPassword" placeholder="Enter Password" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                <button type="submit" id="loginBtn" class="w-full bg-gray-800 text-white font-bold py-2 rounded-md hover:bg-gray-900">Login</button>
                <p id="loginError" class="text-red-500 text-sm text-center hidden">Incorrect Password</p>
            </form>
            <div class="text-center mt-4">
                <a href="index.html" class="text-blue-500 text-sm hover:underline">&larr; Back to Search</a>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="hidden max-w-4xl mx-auto mt-8 space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-lg shadow-sm">
            <div class="flex items-center space-x-4 mb-4 md:mb-0">
                <img src="logo.png" alt="Logo" class="h-12 object-contain" onerror="this.style.display='none'">
                <h1 class="text-2xl font-bold text-gray-800">Admin Dashboard</h1>
            </div>
            <div class="space-x-2">
                <button onclick="document.getElementById('passwordModal').classList.remove('hidden')" class="bg-yellow-500 hover:bg-yellow-600 text-white text-sm px-4 py-2 rounded transition">Change Password</button>
                <a href="index.html" class="bg-gray-500 hover:bg-gray-600 text-white text-sm px-4 py-2 rounded transition">Go to Search</a>
            </div>
        </div>

        <div class="bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Add New Student</h2>
            <form id="addForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-gray-700 font-medium mb-1">Name *</label><input type="text" id="name" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-gray-700 font-medium mb-1">Registration No *</label><input type="text" id="registration_no" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-gray-700 font-medium mb-1">Date of Registration *</label><input type="date" id="date" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">State *</label>
                        <select id="state" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">-- Select State --</option>
                            <option value="">Any</option>
                            <option value="Andhra Pradesh">Andhra Pradesh</option>
                            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                            <option value="Assam">Assam</option>
                            <option value="Bihar">Bihar</option>
                            <option value="Chhattisgarh">Chhattisgarh</option>
                            <option value="Goa">Goa</option>
                            <option value="Gujarat">Gujarat</option>
                            <option value="Haryana">Haryana</option>
                            <option value="Himachal Pradesh">Himachal Pradesh</option>
                            <option value="Jharkhand">Jharkhand</option>
                            <option value="Karnataka">Karnataka</option>
                            <option value="Kerala">Kerala</option>
                            <option value="Madhya Pradesh">Madhya Pradesh</option>
                            <option value="Maharashtra">Maharashtra</option>
                            <option value="Manipur">Manipur</option>
                            <option value="Meghalaya">Meghalaya</option>
                            <option value="Mizoram">Mizoram</option>
                            <option value="Nagaland">Nagaland</option>
                            <option value="Odisha">Odisha</option>
                            <option value="Punjab">Punjab</option>
                            <option value="Rajasthan">Rajasthan</option>
                            <option value="Sikkim">Sikkim</option>
                            <option value="Tamil Nadu">Tamil Nadu</option>
                            <option value="Telangana">Telangana</option>
                            <option value="Tripura">Tripura</option>
                            <option value="Uttar Pradesh">Uttar Pradesh</option>
                            <option value="Uttarakhand">Uttarakhand</option>
                            <option value="West Bengal">West Bengal</option>
                            <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                            <option value="Chandigarh">Chandigarh</option>
                            <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra & Nagar Haveli and Daman & Diu</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                            <option value="Ladakh">Ladakh</option>
                            <option value="Lakshadweep">Lakshadweep</option>
                            <option value="Puducherry">Puducherry</option>
                            </select>
                    </div>
                    <div><label class="block text-gray-700 font-medium mb-1">Kyu</label><input type="text" id="kyu" placeholder="e.g. 10th" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Colour Belt</label>
                        <select id="belt" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">-- Select Belt --</option>
                            <option value="White">White</option><option value="Yellow">Yellow</option><option value="Orange">Orange</option>
                            <option value="Green">Green</option><option value="Blue">Blue</option><option value="Purple">Purple</option>
                            <option value="Brown">Brown</option><option value="Black">Black</option>
                        </select>
                    </div>
                </div>
                <p id="beltError" class="text-red-500 text-sm hidden">Please enter either Kyu or select a Colour Belt.</p>
                <button id="submitBtn" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md disabled:opacity-50 mt-4">Save Student</button>
            </form>
        </div>

        <div class="bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Manage Existing Students</h2>
            <form id="adminSearchForm" class="flex space-x-4 mb-4">
                <input type="text" id="adminSearchReg" placeholder="Enter Registration No..." class="flex-1 px-4 py-2 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-indigo-500">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-md font-bold transition">Search</button>
            </form>
            <div class="overflow-x-auto">
                <table class="min-w-full text-left border-collapse" id="adminResultsTable" style="display: none;">
                    <thead class="bg-gray-50 border-b">
                        <tr><th class="px-4 py-2 text-sm text-gray-700">Name</th><th class="px-4 py-2 text-sm text-gray-700">Reg No</th><th class="px-4 py-2 text-sm text-gray-700">Action</th></tr>
                    </thead>
                    <tbody id="adminResultsBody" class="divide-y divide-gray-200"></tbody>
                </table>
                <p id="adminNoResults" class="text-gray-500 text-sm hidden mt-2">No student found.</p>
            </div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold mb-4 border-b pb-2">Edit Student</h3>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="edit_id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium mb-1">Name *</label><input type="text" id="edit_name" required class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500"></div>
                    <div><label class="block text-sm font-medium mb-1">Reg No *</label><input type="text" id="edit_registration_no" required class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500"></div>
                    <div><label class="block text-sm font-medium mb-1">Date *</label><input type="date" id="edit_date" required class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500"></div>
                    <div>
                        <label class="block text-sm font-medium mb-1">State *</label>
                        <select id="edit_state" required class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="">-- Select State --</option>
                            <option value="West Bengal">West Bengal</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Maharashtra">Maharashtra</option>
                        </select>
                    </div>
                    <div><label class="block text-sm font-medium mb-1">Kyu</label><input type="text" id="edit_kyu" class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500"></div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Colour Belt</label>
                        <select id="edit_belt" class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="">-- Select Belt --</option>
                            <option value="White">White</option><option value="Yellow">Yellow</option><option value="Orange">Orange</option>
                            <option value="Green">Green</option><option value="Blue">Blue</option><option value="Purple">Purple</option>
                            <option value="Brown">Brown</option><option value="Black">Black</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end space-x-2 mt-6">
                    <button type="button" onclick="document.getElementById('editModal').classList.add('hidden')" class="px-4 py-2 text-gray-600 bg-gray-200 hover:bg-gray-300 rounded font-bold transition">Cancel</button>
                    <button type="submit" id="updateBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold transition disabled:opacity-50">Update Student</button>
                </div>
            </form>
        </div>
    </div>

    <div id="passwordModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-lg w-full max-w-sm">
            <h3 class="text-lg font-bold mb-4">Change Password</h3>
            <form id="changePwdForm" class="space-y-4">
                <input type="password" id="newPwd" placeholder="New Password" required class="w-full px-4 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
                <div class="flex justify-end space-x-2 mt-4">
                    <button type="button" onclick="document.getElementById('passwordModal').classList.add('hidden')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-yellow-500 text-white rounded hover:bg-yellow-600">Update</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://karate-api.karateamitshaw.workers.dev"; // REPLACE THIS e.g., https://karate-api.you.workers.dev
        let sessionPassword = "";

        // LOGIN LOGIC
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pwdInput = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');
            
            btn.disabled = true; btn.innerText = "Verifying..."; err.classList.add('hidden');

            try {
                const res = await fetch(`${API_URL}/verify-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwdInput })
                });

                if (res.ok) {
                    sessionPassword = pwdInput;
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('adminDashboard').classList.remove('hidden');
                } else { err.classList.remove('hidden'); }
            } catch (error) { alert("Connection error."); } 
            finally { btn.disabled = false; btn.innerText = "Login"; }
        });

        // ADD STUDENT LOGIC
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true; submitBtn.innerText = "Saving Data...";

            const data = {
                password: sessionPassword, 
                name: document.getElementById('name').value.trim(),
                registration_no: document.getElementById('registration_no').value.trim(),
                date_of_registration: document.getElementById('date').value,
                kyu: document.getElementById('kyu').value.trim(),
                colour_belt: document.getElementById('belt').value,
                state: document.getElementById('state').value
            };

            try {
                const response = await fetch(`${API_URL}/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if(response.ok) {
                    alert("Saved successfully!"); document.getElementById('addForm').reset(); 
                } else { alert("Error saving data."); }
            } catch (error) { alert("Network Error."); } 
            finally { submitBtn.disabled = false; submitBtn.innerText = "Save Student"; }
        });

        // SEARCH FOR EDIT LOGIC
        document.getElementById('adminSearchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const regNo = document.getElementById('adminSearchReg').value.trim();
            if(!regNo) return;

            try {
                const response = await fetch(`${API_URL}/search?registration_no=${regNo}`);
                const data = await response.json();
                
                const table = document.getElementById('adminResultsTable');
                const tbody = document.getElementById('adminResultsBody');
                const noRes = document.getElementById('adminNoResults');
                
                tbody.innerHTML = ""; 

                if(data.length === 0) {
                    table.style.display = 'none';
                    noRes.classList.remove('hidden');
                } else {
                    noRes.classList.add('hidden');
                    table.style.display = 'table';
                    data.forEach(student => {
                        // Store student data in a data attribute so we can load it into the form
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="px-4 py-2 text-sm">${student.name}</td>
                            <td class="px-4 py-2 text-sm">${student.registration_no}</td>
                            <td class="px-4 py-2">
                                <button class="bg-blue-100 text-blue-700 px-3 py-1 rounded text-sm font-bold hover:bg-blue-200 transition" 
                                    onclick='openEditModal(${JSON.stringify(student)})'>Edit</button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            } catch(e) { alert("Search error"); }
        });

        // OPEN EDIT MODAL
        function openEditModal(student) {
            document.getElementById('edit_id').value = student.id;
            document.getElementById('edit_name').value = student.name;
            document.getElementById('edit_registration_no').value = student.registration_no;
            document.getElementById('edit_date').value = student.date_of_registration;
            document.getElementById('edit_state').value = student.state;
            document.getElementById('edit_kyu').value = student.kyu || "";
            document.getElementById('edit_belt').value = student.colour_belt || "";
            
            document.getElementById('editModal').classList.remove('hidden');
        }

        // UPDATE STUDENT LOGIC
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const updateBtn = document.getElementById('updateBtn');
            updateBtn.disabled = true; updateBtn.innerText = "Updating...";

            const data = {
                password: sessionPassword,
                id: document.getElementById('edit_id').value,
                name: document.getElementById('edit_name').value.trim(),
                registration_no: document.getElementById('edit_registration_no').value.trim(),
                date_of_registration: document.getElementById('edit_date').value,
                kyu: document.getElementById('edit_kyu').value.trim(),
                colour_belt: document.getElementById('edit_belt').value,
                state: document.getElementById('edit_state').value
            };

            try {
                const response = await fetch(`${API_URL}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if(response.ok) {
                    alert("Updated successfully!");
                    document.getElementById('editModal').classList.add('hidden');
                    document.getElementById('adminSearchForm').dispatchEvent(new Event('submit')); // refresh search
                } else { alert("Error updating data."); }
            } catch (error) { alert("Network Error."); } 
            finally { updateBtn.disabled = false; updateBtn.innerText = "Update Student"; }
        });

        // CHANGE PASSWORD LOGIC
        document.getElementById('changePwdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPwd = document.getElementById('newPwd').value;
            try {
                const res = await fetch(`${API_URL}/change-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword: sessionPassword, newPassword: newPwd })
                });

                if (res.ok) {
                    alert("Password updated!"); sessionPassword = newPwd; 
                    document.getElementById('passwordModal').classList.add('hidden');
                    document.getElementById('changePwdForm').reset();
                } else { alert("Failed to update."); }
            } catch(e) { alert("Network error"); }
        });
    </script>
</body>
</html>
